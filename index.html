<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Quiz 💕</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sarabun', sans-serif;
    background: linear-gradient(135deg, #ffeef5 0%, #fff0f8 50%, #fce8f3 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: white;
    border-radius: 24px;
    padding: 40px 36px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 8px 40px rgba(220,80,120,0.12);
    position: relative;
    overflow: hidden;
  }

  .container::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: #ffeef5;
    border-radius: 50%;
  }

  .hearts-deco {
    font-size: 22px;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 6px;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    color: #c44a7a;
    text-align: center;
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    color: #e08aaa;
    font-size: 15px;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 15px;
    color: #c44a7a;
    font-weight: 500;
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    border: 1.5px solid #f5c0d8;
    border-radius: 14px;
    font-size: 16px;
    font-family: 'Sarabun', sans-serif;
    color: #333;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 18px;
  }

  input[type="text"]:focus { border-color: #e0709a; }

  .btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #e0709a, #c44a7a);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-family: 'Sarabun', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }

  .question-num {
    font-size: 13px;
    color: #e08aaa;
    font-weight: 500;
    margin-bottom: 6px;
    text-align: center;
  }

  .question-text {
    font-size: 20px;
    font-weight: 700;
    color: #c44a7a;
    text-align: center;
    margin-bottom: 24px;
    line-height: 1.4;
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 8px;
  }

  .choice-btn {
    padding: 15px 20px;
    border: 1.5px solid #f5c0d8;
    border-radius: 14px;
    background: white;
    font-size: 16px;
    font-family: 'Sarabun', sans-serif;
    color: #444;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }

  .choice-btn:hover { border-color: #e0709a; background: #fff5f9; }
  .choice-btn:active { transform: scale(0.98); }

  .progress-bar {
    height: 6px;
    background: #fce8f3;
    border-radius: 10px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #e0709a, #c44a7a);
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  .page { display: none; }
  .page.active { display: block; }

  .score-display {
    font-size: 52px;
    font-weight: 700;
    color: #c44a7a;
    text-align: center;
    margin: 12px 0 4px;
  }

  .score-label {
    text-align: center;
    color: #e08aaa;
    font-size: 16px;
    margin-bottom: 16px;
  }

  .result-msg {
    background: #fff5f9;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    color: #c44a7a;
    font-size: 17px;
    line-height: 1.6;
    margin-bottom: 24px;
    white-space: pre-line;
  }

  .popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .popup-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .popup-box {
    background: white;
    border-radius: 24px;
    padding: 36px 32px;
    text-align: center;
    max-width: 300px;
    width: 90%;
    transform: scale(0.85);
    transition: transform 0.25s;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  }

  .popup-overlay.show .popup-box { transform: scale(1); }

  .popup-icon { font-size: 64px; margin-bottom: 12px; }
  .popup-text { font-size: 20px; font-weight: 700; color: #333; margin-bottom: 20px; line-height: 1.4; }

  .popup-btn {
    padding: 12px 32px;
    background: linear-gradient(135deg, #e0709a, #c44a7a);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-family: 'Sarabun', sans-serif;
    font-weight: 700;
    cursor: pointer;
  }

  .popup-btn:hover { opacity: 0.9; }

  .stars-rain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    overflow: hidden;
  }

  .star-particle {
    position: absolute;
    font-size: 24px;
    animation: fall 1.2s ease-in forwards;
  }

  @keyframes fall {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  .x-rain .star-particle { font-size: 28px; }
</style>
</head>
<body>

<div class="stars-rain" id="rainContainer"></div>

<div class="popup-overlay" id="popup">
  <div class="popup-box">
    <div class="popup-icon" id="popupIcon">⭐</div>
    <div class="popup-text" id="popupText">ถูกต้องละค้าบบบ</div>
    <button class="popup-btn" onclick="closePopup()">ต่อไป →</button>
  </div>
</div>

<div class="container">

  <!-- Page 0: Name input -->
  <div class="page active" id="page0">
    <div class="hearts-deco">💕 💗 💕</div>
    <h1>Love Quiz</h1>
    <p class="subtitle">ครบรอบวันพิเศษของฉันและเธอ ✨</p>
    <label for="nameInput">โปรดใส่ชื่อของเธอ</label>
    <input type="text" id="nameInput" placeholder="ใส่ชื่อของเธอตรงนี้เลยนะ..." />
    <button class="btn" onclick="startQuiz()">เริ่มเลย 💖</button>
  </div>

  <!-- Page 1 -->
  <div class="page" id="page1">
    <div class="progress-bar"><div class="progress-fill" style="width:33%"></div></div>
    <div class="question-num">ข้อที่ 1 จาก 3</div>
    <div class="question-text">เดทแรกของเราอยู่ที่ไหน? 🗺️</div>
    <div class="choices">
      <button class="choice-btn" onclick="answer(1,false)">🌿 ป่าอเมซอน</button>
      <button class="choice-btn" onclick="answer(1,false)">🐱 คาเฟ่แมว</button>
      <button class="choice-btn" onclick="answer(1,true)">🐠 พิพิธภัณฑ์สัตว์น้ำ</button>
      <button class="choice-btn" onclick="answer(1,false)">🌊 เมืองบาดาล</button>
    </div>
  </div>

  <!-- Page 2 -->
  <div class="page" id="page2">
    <div class="progress-bar"><div class="progress-fill" style="width:66%"></div></div>
    <div class="question-num">ข้อที่ 2 จาก 3</div>
    <div class="question-text">วันครบรอบของเรา ตรงกับวันอะไร? 📅</div>
    <div class="choices">
      <button class="choice-btn" onclick="answer(2,false)">🪷 วันพระ</button>
      <button class="choice-btn" onclick="answer(2,false)">🍑 วันพีช</button>
      <button class="choice-btn" onclick="answer(2,false)">🌾 วันพืชมงคล</button>
      <button class="choice-btn" onclick="answer(2,true)">📆 วันพฤหัสบดี (10/10/2567)</button>
    </div>
  </div>

  <!-- Page 3 -->
  <div class="page" id="page3">
    <div class="progress-bar"><div class="progress-fill" style="width:99%"></div></div>
    <div class="question-num">ข้อที่ 3 จาก 3</div>
    <div class="question-text">ศิลปินที่เราไปดูด้วยกัน คือใคร? 🎵</div>
    <div class="choices">
      <button class="choice-btn" onclick="answer(3,false)">🚂 โบกี้รถไฟ</button>
      <button class="choice-btn" onclick="answer(3,true)">🦁 โบกี้ไลอ้อน</button>
      <button class="choice-btn" onclick="answer(3,false)">🎤 โบว์เมลดา</button>
      <button class="choice-btn" onclick="answer(3,false)">🎳 โบว์ลิ่ง</button>
    </div>
  </div>

  <!-- Page 4: Result -->
  <div class="page" id="page4">
    <div class="hearts-deco">🌟 ✨ 🌟</div>
    <h1 id="resultTitle">ผลลัพธ์</h1>
    <div class="score-display" id="scoreDisplay">3/3</div>
    <div class="score-label" id="scoreName"></div>
    <div style="text-align:center; margin: 16px 0;">
      <img id="resultGif" src="" alt="result gif" style="max-width:100%; border-radius:16px; max-height:220px; object-fit:cover;" />
    </div>
    <div class="result-msg" id="resultMsg"></div>
    <button class="btn" onclick="restart()">เล่นใหม่อีกรอบ 🔄</button>
  </div>

</div>

<script>
  let playerName = '';
  let score = 0;
  let currentQ = 0;
  let pendingPage = 0;
  let wrongCount = 0;
  let correctCount = 0;

  function startQuiz() {
    const val = document.getElementById('nameInput').value.trim();
    if (!val) {
      document.getElementById('nameInput').style.borderColor = '#e0709a';
      document.getElementById('nameInput').focus();
      return;
    }
    playerName = val;
    score = 0;
    currentQ = 1;
    wrongCount = 0;
    correctCount = 0;
    showPage(1);
  }

  function showPage(n) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page' + n).classList.add('active');
  }

  function answer(q, correct) {
    pendingPage = q + 1;
    if (correct) {
      score++;
      correctCount++;
      triggerStars();
      showPopup(true);
    } else {
      wrongCount++;
      triggerX();
      showPopup(false);
    }
  }

  function showPopup(correct) {
    const overlay = document.getElementById('popup');
    const icon = document.getElementById('popupIcon');
    const text = document.getElementById('popupText');
    if (correct) {
      icon.textContent = '⭐';
      if (correctCount === 1) text.textContent = 'ถูกต้องละค้าบบบ 🎉';
      else if (correctCount === 2) text.textContent = 'เธอเก่งมากตอบถูกข้อ 2 แล้ว 🫣';
      else text.textContent = 'เธอก็สุดยอดไป ตอบถูกทุกข้อเลย 🥳';
    } else {
      icon.textContent = '❌';
      if (wrongCount === 1) text.textContent = 'แง เธอตอบผิดแล้วนะ 😢';
      else if (wrongCount === 2) text.textContent = 'เธอตอบผิดข้อ 2 แล้วนะ 😑';
      else text.textContent = 'เธอกวนตีนเค้าละ 😤';
    }
    overlay.classList.add('show');
  }

  function closePopup() {
    document.getElementById('popup').classList.remove('show');
    if (pendingPage <= 3) {
      showPage(pendingPage);
    } else {
      showResult();
    }
  }

  function showResult() {
    showPage(4);
    document.getElementById('scoreDisplay').textContent = score + '/3';
    document.getElementById('scoreName').textContent = playerName + ' ตอบถูก ' + score + ' ข้อ';

    const gifs = {
      0: 'https://media1.tenor.com/m/GIQybzxRoNIAAAAC/very-sad-hampter-huhu.gif',
      1: 'https://media1.tenor.com/m/tG9tx98sqGgAAAAd/cat.gif',
      2: 'https://media1.tenor.com/m/lfDATg4Bhc0AAAAC/happy-cat.gif',
      3: 'https://media1.tenor.com/m/fitGu2TwtHoAAAAd/cat-hyppy.gif'
    };
    document.getElementById('resultGif').src = gifs[score];

    let msg = '';
    if (score === 3) {
      msg = '🥰 ' + playerName + ' จำทุกอย่างได้เลยนะ!\nเธอรู้ว่าเรื่องราวของเราล้ำค่าแค่ไหน\nรักเธอมากๆ นะ 💕';
      document.getElementById('resultTitle').textContent = 'เยี่ยมมาก!';
    } else if (score === 2) {
      msg = '😊 ' + playerName + ' ตอบถูกเกือบหมดเลย!\nยังไงก็รักเธอเต็มๆ นะ 💖';
      document.getElementById('resultTitle').textContent = 'ดีมากเลย!';
    } else if (score === 1) {
      msg = '😅 ' + playerName + ' ตอบถูกได้แค่ข้อเดียวเองเหรอ~\nไม่เป็นไร ยังรักเธออยู่ดี 💝';
      document.getElementById('resultTitle').textContent = 'พยายามอีกนิดนะ!';
    } else {
      msg = '😭 ' + playerName + ' ไม่จำเลยเหรอ อกหักมากเลย~\nไม่เป็นไร เดี๋ยวเล่าให้ฟังใหม่ได้ 💔';
      document.getElementById('resultTitle').textContent = 'ลืมหมดเลยเหรอ?';
    }
    document.getElementById('resultMsg').textContent = msg;
  }

  function restart() {
    score = 0;
    currentQ = 0;
    wrongCount = 0;
    correctCount = 0;
    document.getElementById('nameInput').value = '';
    showPage(0);
  }

  function triggerStars() {
    const container = document.getElementById('rainContainer');
    container.innerHTML = '';
    const emojis = ['⭐','✨','🌟','💫','⭐','✨'];
    for (let i = 0; i < 18; i++) {
      const el = document.createElement('div');
      el.className = 'star-particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDelay = (Math.random() * 0.6) + 's';
      el.style.animationDuration = (0.9 + Math.random() * 0.6) + 's';
      container.appendChild(el);
    }
    setTimeout(() => container.innerHTML = '', 2000);
  }

  function triggerX() {
    const container = document.getElementById('rainContainer');
    container.innerHTML = '';
    container.classList.add('x-rain');
    const emojis = ['❌','💔','😢'];
    for (let i = 0; i < 14; i++) {
      const el = document.createElement('div');
      el.className = 'star-particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.animationDelay = (Math.random() * 0.5) + 's';
      el.style.animationDuration = (1 + Math.random() * 0.5) + 's';
      container.appendChild(el);
    }
    setTimeout(() => { container.innerHTML = ''; container.classList.remove('x-rain'); }, 2000);
  }
</script>
</body>
</html>
